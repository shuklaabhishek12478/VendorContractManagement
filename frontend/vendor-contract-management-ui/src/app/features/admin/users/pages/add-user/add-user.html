<div class="page-wrapper">

    <div class="page-header">

        <div>

            <h1>Create User</h1>

            <p>
                Create a new application user.
            </p>

        </div>

        <button
        mat-stroked-button
        color="primary"
        routerLink="/users">

        <mat-icon>arrow_back</mat-icon>

        Back 

    </button>

    </div>

    <mat-card class="page-card">

        <app-user-form
            *ngIf="form"
            [form]="form"
            [editMode]="false"
            (save)="save()"
             (cancel)="goBack()">
        </app-user-form>

    </mat-card>

</div>
