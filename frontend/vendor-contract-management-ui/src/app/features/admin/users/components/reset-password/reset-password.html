<div class="hero">

    <div class="hero-left">

        <h1>

            Reset Password

        </h1>

        <p>

            Change the password for this user.

        </p>

    </div>

    <div class="hero-right">

        <button
            mat-stroked-button
            routerLink="/users">

            <mat-icon>

                arrow_back

            </mat-icon>

            Back

        </button>

    </div>

</div>

<mat-card>

    <mat-card-header>

        <mat-card-title>

            Password Information

        </mat-card-title>

        <mat-card-subtitle>

            Enter a secure password.

        </mat-card-subtitle>

    </mat-card-header>

    <mat-divider></mat-divider>

    <mat-card-content>

        <form
            [formGroup]="form">

            <mat-form-field
    appearance="outline"
    class="full-width">

    <mat-label>

        New Password

    </mat-label>

    <input
        matInput
        [type]="hidePassword ? 'password' : 'text'"
        formControlName="password"
        (input)="checkStrength()">

    <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hidePassword=!hidePassword">

        <mat-icon>

            {{hidePassword ? 'visibility' : 'visibility_off'}}

        </mat-icon>

    </button>

</mat-form-field>

       <mat-form-field
    appearance="outline"
    class="full-width">

    <mat-label>

        Confirm Password

    </mat-label>

    <input
        matInput
        [type]="hideConfirmPassword ? 'password' : 'text'"
        formControlName="confirmPassword">

    <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hideConfirmPassword=!hideConfirmPassword">

        <mat-icon>

            {{hideConfirmPassword ? 'visibility' : 'visibility_off'}}

        </mat-icon>

    </button>

</mat-form-field>

        </form>

    </mat-card-content>

    <mat-divider></mat-divider>

    <mat-card-actions align="end">

        <button
            mat-button
            routerLink="/users">

            Cancel

        </button>

        <button
            mat-raised-button
            color="primary"
            [disabled]="saving || form.invalid"
            (click)="save()">

            Reset Password

        </button>

    </mat-card-actions>

</mat-card>
