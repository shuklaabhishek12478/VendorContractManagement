<div class="actions-grid">

    <div
        class="action-card"
        *ngFor="let item of actions"
        (click)="execute(item.action)">

        <div
            class="icon"
            [ngClass]="item.color">

            {{ item.icon }}

        </div>

        <div class="content">

            <h4>

                {{ item.title }}

            </h4>

            <p>

                {{ item.subtitle }}

            </p>

        </div>

    </div>

</div>
