

@if(contract){

<div class="page-container">

   <div class="page-header">

      <button
          class="secondary-btn"
          (click)="cancel()">

          ← Back

      </button>

   </div>

   <div class="page-header">

      <h2 class="page-title">
          Edit Contract
      </h2>

      <p class="text-gray-500">
          {{ contract?.contractNumber }}
      </p>

   </div>

   <app-contract-form
      
      [form]="form"
      [vendors]="vendors"
      [loading]="loading"
      [contractNumber]="contract.contractNumber"
      [status]="contract.status.toString()"
      (save)="save()"
      (cancel)="cancel()">
   </app-contract-form>

</div>

}
