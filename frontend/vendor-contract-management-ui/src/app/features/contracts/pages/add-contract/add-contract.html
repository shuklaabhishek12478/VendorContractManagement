<div class="page-container">

  <div class="page-header">

    <div>

      <h2>Add Contract</h2>

      <p>Create a new vendor contract</p>

    </div>

  </div>

  <mat-card>

    <mat-card-content>

      <form
        [formGroup]="form"
        (ngSubmit)="save()">

        <div class="form-grid">

          <!-- Contract Number 

          <mat-form-field appearance="outline">

            <mat-label>Contract Number</mat-label>

            <input
              matInput
              formControlName="contractNumber">

            <mat-error
              *ngIf="form.get('contractNumber')?.hasError('required')">

              Contract Number is required

            </mat-error>

          </mat-form-field>-->

          <!-- Title -->

          <mat-form-field appearance="outline">

            <mat-label>Title</mat-label>

            <input
              matInput
              formControlName="title">

            <mat-error
              *ngIf="form.get('title')?.hasError('required')">

              Title is required

            </mat-error>

          </mat-form-field>

          <!-- Vendor -->

          <mat-form-field appearance="outline">

            <mat-label>Vendor</mat-label>

            <mat-select formControlName="vendorId">

              <mat-option
                *ngFor="let vendor of vendors"
                [value]="vendor.id">

                {{ vendor.vendorName }}

              </mat-option>

            </mat-select>

            <mat-error
              *ngIf="form.get('vendorId')?.hasError('required')">

              Vendor is required

            </mat-error>

          </mat-form-field>

          <!-- Contract Value -->

          <mat-form-field appearance="outline">

            <mat-label>Contract Value</mat-label>

            <input
              matInput
              type="number"
              formControlName="contractValue">

            <mat-error
              *ngIf="form.get('contractValue')?.hasError('required')">

              Contract Value is required

            </mat-error>

          </mat-form-field>

          <!-- Start Date -->

          <mat-form-field appearance="outline">

            <mat-label>Start Date</mat-label>

            <input
              matInput
              [matDatepicker]="startPicker"
              formControlName="startDate">

            <mat-datepicker-toggle
              matIconSuffix
              [for]="startPicker">
            </mat-datepicker-toggle>

            <mat-datepicker #startPicker></mat-datepicker>

          </mat-form-field>

          <!-- End Date -->

          <mat-form-field appearance="outline">

            <mat-label>End Date</mat-label>

            <input
              matInput
              [matDatepicker]="endPicker"
              formControlName="endDate">

            <mat-datepicker-toggle
              matIconSuffix
              [for]="endPicker">
            </mat-datepicker-toggle>

            <mat-datepicker #endPicker></mat-datepicker>

          </mat-form-field>

        </div>

        <!-- Description -->

        <mat-form-field
          appearance="outline"
          class="full-width">

          <mat-label>Description</mat-label>

          <textarea
            matInput
            rows="5"
            formControlName="description">
          </textarea>

        </mat-form-field>

        <div class="button-row">

          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loading">

            Save

          </button>

          <button
            mat-raised-button
            type="button"
            (click)="cancel()">

            Cancel

          </button>

        </div>

      </form>

    </mat-card-content>

  </mat-card>

</div>
