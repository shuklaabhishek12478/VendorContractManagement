<div class="page-container">

  <div class="page-header">

    <div>

      <h2>Add Contract</h2>

      <p>Create a new vendor contract</p>

    </div>

  </div>

  <mat-card>

    <mat-card-content>

      <app-contract-form

        [form]="form"

        [vendors]="vendors"

        [loading]="loading"

        (save)="save()"

        (cancel)="cancel()">

      </app-contract-form>

    </mat-card-content>

  </mat-card>

</div>
