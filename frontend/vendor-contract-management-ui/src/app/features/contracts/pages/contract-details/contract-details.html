
<div class="page-container" *ngIf="contract && !loading">

  <div class="flex justify-between items-center mb-6">

    <div>

      <h2 class="text-2xl font-bold">
        Contract Details
      </h2>

      <p class="text-gray-500">
        {{ contract.contractNumber }}
      </p>

    </div>

    <div class="flex gap-3">

      <button
        mat-raised-button
        class="primary-btn"
        color="primary"
        (click)="edit()">

         ✏ Edit Contract

      </button>

      <button
        mat-stroked-button
         class="secondary-btn"
        (click)="back()">

        ← Back

      </button>

    </div>

  </div>

  <!-- cards -->
  

  <!-- General Information -->

  <mat-card>

    <mat-card-header>

      <mat-card-title>

        General Information

      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <app-contract-general-info

        [contract]="contract"
        [vendor]="vendor">

      </app-contract-general-info>

    </mat-card-content>

  </mat-card>

  <!-- Status -->

  <mat-card class="mt-5">

    <mat-card-header>

      <mat-card-title>

        Status & Approval

      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <app-contract-status-info

        [contract]="contract">

      </app-contract-status-info>

    </mat-card-content>

  </mat-card>

  <!-- Lifecycle -->

  <mat-card class="mt-5">

    <mat-card-header>

      <mat-card-title>

        Lifecycle Information

      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <app-contract-lifecycle-info

        [contract]="contract">

      </app-contract-lifecycle-info>

    </mat-card-content>

  </mat-card>

</div>

<div *ngIf="loading">

  Loading...

</div>
