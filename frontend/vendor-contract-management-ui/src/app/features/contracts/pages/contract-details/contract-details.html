
<div class="page-container" *ngIf="contract && !loading">

  <div class="flex justify-between items-center mb-6">

    <div>

      <h2 class="text-2xl font-bold">
        Contract Details
      </h2>

      <p class="text-gray-500">
        {{ contract.contractNumber }}
      </p>

    </div>

    <div class="flex gap-3">

      <button
        mat-raised-button
        class="primary-btn"
        color="primary"
        (click)="edit()">

         ✏ Edit Contract

      </button>

      <button
        mat-stroked-button
         class="secondary-btn"
        (click)="back()">

        ← Back

      </button>

    </div>

  </div>

  <!-- cards -->
  
  <div class="flex flex-wrap gap-3 mb-5">

    <app-contract-workflow-card

            [contract]="contract"
            (submit)="submitContract()"
            (approve)="approveContract()"
            (reject)="rejectContract()"
            (activate)="activateContract()"
            (renew)="renewContract()"
            (approveRenewal)="approveRenewal()"
            (activateRenewal)="activateRenewal()"
            (rejectRenewal)="rejectRenewal()"
            (terminate)="terminateContract()">

    </app-contract-workflow-card>

  <button
      mat-raised-button
      color="primary"
      *ngIf="contract.status === 0"
      (click)="submitContract()">

      Submit

  </button>

  <button
      mat-raised-button
      color="primary"
      *ngIf="contract.status === 1"
      (click)="approveContract()">

      Approve

  </button>

  <button
      mat-raised-button
      color="warn"
      *ngIf="contract.status === 1"
      (click)="rejectContract()">

      Reject

  </button>

</div>

  <!-- General Information -->

  <mat-card>

    <mat-card-header>

      <mat-card-title>

        General Information

      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <app-contract-general-info

        [contract]="contract"
        [vendor]="vendor">

      </app-contract-general-info>

    </mat-card-content>

  </mat-card>

  <!-- Status -->

  <mat-card class="mt-5">

    <mat-card-header>

      <mat-card-title>

        Status & Approval

      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <app-contract-status-info

        [contract]="contract">

      </app-contract-status-info>

    </mat-card-content>

  </mat-card>

  <!-- Lifecycle -->

  <mat-card class="mt-5">

    <mat-card-header>

      <mat-card-title>

        Lifecycle Information

      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <app-contract-lifecycle-info

        [contract]="contract">

      </app-contract-lifecycle-info>

    </mat-card-content>

  </mat-card>

  <mat-card class="mt-5">

    <mat-card-header>

        <mat-card-title>

            Renewal History

        </mat-card-title>

    </mat-card-header>

    <mat-card-content>

        <table class="table-auto w-full">

            <thead>

                <tr>

                    <th>Contract No</th>

                    <th>Start</th>

                    <th>End</th>

                    <th>Status</th>

                </tr>

            </thead>

            <tbody>

                <tr
                    *ngFor="let renewal of renewals">

                    <td>

                        {{ renewal.contractNumber }}

                    </td>

                    <td>

                        {{ renewal.startDate | date }}

                    </td>

                    <td>

                        {{ renewal.endDate | date }}

                    </td>

                    <td>

                        {{ renewal.status }}

                    </td>

                </tr>

            </tbody>

        </table>

        <div
            *ngIf="renewals.length===0"
            class="text-gray-500">

            No renewals found.

        </div>

    </mat-card-content>

</mat-card>

</div>

<div *ngIf="loading">

  Loading...

</div>
