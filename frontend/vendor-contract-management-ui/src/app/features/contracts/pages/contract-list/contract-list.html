<div class="space-y-6">

  <div class="flex items-center justify-between">

    <div>

      <h1 class="text-3xl font-bold">
        Contracts
      </h1>

      <p class="text-slate-500">
        Manage all contracts
      </p>

    </div>

    <app-contract-toolbar

      [selectedContract]="selectedContract"

      [selectedContracts]="selectedContracts"

      (add)="onAddContract()"

      (edit)="onEditContract()"

      (archive)="archiveContracts()"

    (remove)="removeContracts()">

    </app-contract-toolbar>

  </div>

  <div class="flex items-center gap-3 mb-4">

    <input

      type="text"

      placeholder="Search contracts..."

      (input)="onSearch($event)"

      class="w-full border rounded-xl px-4 py-3"/>

    <select
    class="border rounded px-3 py-2"
    (change)="onStatusFilterChanged($event)">

    <option value="">
        All Contracts
    </option>

    @for(status of ContractStatusOption; track status.value){

        <option
            [value]="status.value">

            {{ status.label }}

        </option>

    }

</select>

  </div>

  <div
    class="rounded-2xl overflow-hidden shadow-sm border"
    style="height:600px;width:100%;">

    <ag-grid-angular

      class="ag-theme-quartz"
  style="width:100%; height:100%;"
  [rowData]="rowData"
  rowSelection="multiple"
  [columnDefs]="columnDefs"
  [pagination]="true"
  [paginationPageSize]="10"
  (sortChanged)="onSortChanged()"
  [paginationPageSizeSelector]="[10,20,50,100]"
  (gridReady)="onGridReady($event)"
  (rowDoubleClicked)="onRowDoubleClicked($event)"
  (selectionChanged)="onSelectionChanged()"
  [getRowId]="getRowId"
  [context]="context">

    </ag-grid-angular>

  </div>

</div>
