<div class="grid grid-cols-2 gap-6">

    <div>

        <label class="text-gray-500">
            Contract Number
        </label>

        <div class="font-medium">

            {{ contract.contractNumber }}

        </div>

    </div>

    <div>

        <label class="text-gray-500">
            Title
        </label>

        <div class="font-medium">

            {{ contract.title }}

        </div>

    </div>

    <div>

        <label class="text-gray-500">
            Vendor
        </label>

        <div class="font-medium">

            {{ vendor?.vendorName }}

        </div>

    </div>

    <div>

        <label class="text-gray-500">
            Contract Value
        </label>

        <div class="font-medium">

            {{ contract.contractValue | currency:'INR' }}

        </div>

    </div>

    <div>

        <label class="text-gray-500">
            Start Date
        </label>

        <div class="font-medium">

            {{ contract.startDate | date }}

        </div>

    </div>

    <div>

        <label class="text-gray-500">
            End Date
        </label>

        <div class="font-medium">

            {{ contract.endDate | date }}

        </div>

    </div>

    <div class="col-span-2">

        <label class="text-gray-500">

            Description

        </label>

        <div class="font-medium whitespace-pre-line">

            {{ contract.description }}

        </div>

    </div>

</div>
