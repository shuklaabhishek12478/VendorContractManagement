

<form
  [formGroup]="form"
  (ngSubmit)="onSave()">

  <div class="form-grid">

    <mat-form-field appearance="outline">

        <mat-label>Contract Number</mat-label>

        <input
            matInput
            [value]="contractNumber"
            readonly>

    </mat-form-field>

    <mat-form-field appearance="outline">

        <mat-label>Current Status</mat-label>

        <input
            matInput
            [value]="statusLabel"
            readonly>

    </mat-form-field>

</div>

  <div class="form-grid">

  

    <!-- Title -->

    <mat-form-field appearance="outline">

      <mat-label>Title</mat-label>

      <input
        matInput
        formControlName="title">

      <mat-error *ngIf="form.get('title')?.hasError('required')">
        Title is required
      </mat-error>

    </mat-form-field>

    <!-- Vendor -->

    <mat-form-field appearance="outline">

      <mat-label>Vendor</mat-label>

      <mat-select formControlName="vendorId">

        <mat-option
          *ngFor="let vendor of vendors"
          [value]="vendor.id">

          {{ vendor.vendorName }}

        </mat-option>

      </mat-select>

      <mat-error *ngIf="form.get('vendorId')?.hasError('required')">
        Vendor is required
      </mat-error>

    </mat-form-field>

    <!-- Contract Value -->

    <mat-form-field appearance="outline">

      <mat-label>Contract Value</mat-label>

      <input
        matInput
        type="number"
        formControlName="contractValue">

      <mat-error *ngIf="form.get('contractValue')?.hasError('required')">
        Contract Value is required
      </mat-error>

    </mat-form-field>

    <!-- Start Date -->

    <mat-form-field appearance="outline">

      <mat-label>Start Date</mat-label>

      <input
        matInput
        [matDatepicker]="startPicker"
        formControlName="startDate">

      <mat-datepicker-toggle
        matSuffix
        [for]="startPicker">
      </mat-datepicker-toggle>

      <mat-datepicker #startPicker></mat-datepicker>

    </mat-form-field>

    <!-- End Date -->

    <mat-form-field appearance="outline">

      <mat-label>End Date</mat-label>

      <input
        matInput
        [matDatepicker]="endPicker"
        formControlName="endDate">

      <mat-datepicker-toggle
        matSuffix
        [for]="endPicker">
      </mat-datepicker-toggle>

      <mat-datepicker #endPicker></mat-datepicker>

    </mat-form-field>

  </div>

  <!-- Description -->

  <mat-form-field
    appearance="outline"
    class="full-width">

    <mat-label>Description</mat-label>

    <textarea
      matInput
      rows="5"
      formControlName="description">
    </textarea>

  </mat-form-field>

  <div class="button-row">

    <button
    mat-raised-button
    color="primary"
    type="button"
    [disabled]="loading || form.invalid || !form.dirty"
    (click)="onSave()">

    Save

</button>

<button
    mat-raised-button
    type="button"
    (click)="onCancel()">

    Cancel

</button>

  </div>

</form>
