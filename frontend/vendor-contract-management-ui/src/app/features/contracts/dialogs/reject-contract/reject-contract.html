<h2 mat-dialog-title>

Reject Contract

</h2>

<mat-dialog-content>

<form [formGroup]="form">

<mat-form-field appearance="outline" class="w-full">

<mat-label>

Reason

</mat-label>

<textarea
matInput
rows="4"
formControlName="reason">

</textarea>

<mat-error>

Reason is required

</mat-error>

</mat-form-field>

</form>

</mat-dialog-content>

<mat-dialog-actions align="end">

<button
mat-button
(click)="cancel()">

Cancel

</button>

<button
mat-raised-button
color="warn"
(click)="reject()">

Reject

</button>

</mat-dialog-actions>
