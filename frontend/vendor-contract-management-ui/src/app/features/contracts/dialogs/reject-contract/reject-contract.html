<h2 mat-dialog-title>
  Reject Contract
</h2>

<form [formGroup]="form">

  <mat-dialog-content>

    <mat-form-field appearance="outline" class="w-full">

      <mat-label>
        Reason
      </mat-label>

      <textarea
        matInput
        rows="5"
        formControlName="reason">
      </textarea>

      <mat-error *ngIf="form.get('reason')?.hasError('required')">
        Reason is required
      </mat-error>

      <mat-error *ngIf="form.get('reason')?.hasError('minlength')">
        Minimum 5 characters required.
      </mat-error>

    </mat-form-field>

  </mat-dialog-content>

  <mat-dialog-actions align="end">

    <button
      mat-button
      type="button"
      (click)="cancel()">

      Cancel

    </button>

    <button
      mat-raised-button
      color="warn"
      type="button"
      (click)="save()">

      Reject

    </button>

  </mat-dialog-actions>

</form>
