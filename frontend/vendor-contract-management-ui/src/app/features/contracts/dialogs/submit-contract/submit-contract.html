<h2 mat-dialog-title>

    Submit Contract

</h2>

<mat-dialog-content>

    <p>

        Submit this contract for approval?

    </p>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button
        mat-button
        (click)="cancel()">

        Cancel

    </button>

    <button
        mat-raised-button
        color="primary"
        (click)="submit()">

        Submit

    </button>

</mat-dialog-actions>
