<h2 mat-dialog-title>

Renew Contract

</h2>

<form [formGroup]="form">

<mat-dialog-content>

    <mat-form-field appearance="outline" class="w-full">

        <mat-label>

            New End Date

        </mat-label>

        <input
            matInput
            [matDatepicker]="picker"
            formControlName="newEndDate">

        <mat-datepicker-toggle
            matSuffix
            [for]="picker">
        </mat-datepicker-toggle>

        <mat-datepicker #picker></mat-datepicker>

    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">

        <mat-label>

            New Contract Value

        </mat-label>

        <input
            matInput
            type="number"
            formControlName="newContractValue">

    </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

<button
    mat-button
    type="button"
    (click)="cancel()">

Cancel

</button>

<button
    mat-raised-button
    color="primary"
    type="button"
    (click)="save()">

Renew

</button>

</mat-dialog-actions>

</form>
