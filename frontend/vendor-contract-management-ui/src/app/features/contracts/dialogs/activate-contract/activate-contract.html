<h2 mat-dialog-title>

Activate Contract

</h2>

<mat-dialog-content>

This contract has been approved.

Do you want to activate it?

</mat-dialog-content>

<mat-dialog-actions align="end">

<button
mat-button
(click)="cancel()">

Cancel

</button>

<button
mat-raised-button
color="primary"
(click)="activate()">

Activate

</button>

</mat-dialog-actions>
