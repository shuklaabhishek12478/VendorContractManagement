<form
  [formGroup]="form"
  (ngSubmit)="submit()">

  <mat-card class="rounded-2xl shadow-sm">

    <mat-card-header>

      <mat-card-title>

        General Information

      </mat-card-title>

      <mat-card-subtitle>

        Basic details of the application role.

      </mat-card-subtitle>

    </mat-card-header>

    <mat-card-content class="pt-6">

      <div class="grid grid-cols-2 gap-6">

        <mat-form-field appearance="outline" class="w-full">

          <mat-label>

            Role Name

          </mat-label>

          <input
            matInput
            formControlName="name">

          <mat-error
            *ngIf="form.controls.name.hasError('required')">

            Role Name is required

          </mat-error>

        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">

          <mat-label>

            Priority

          </mat-label>

          <input
            matInput
            type="number"
            formControlName="priority">

        </mat-form-field>

      </div>

      <mat-form-field
        appearance="outline"
        class="w-full mt-4">

        <mat-label>

          Description

        </mat-label>

        <textarea
          matInput
          rows="4"
          formControlName="description">
        </textarea>

      </mat-form-field>

      <div class="grid grid-cols-2 gap-6 mt-4">

        <mat-form-field appearance="outline">

          <mat-label>

            Icon

          </mat-label>

          <input
            matInput
            formControlName="icon">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>

            Color

          </mat-label>

          <input
            matInput
            type="color"
            formControlName="color">

        </mat-form-field>

      </div>

      <div class="mt-6">

        <mat-slide-toggle
          color="primary"
          formControlName="isActive">

          Active Role

        </mat-slide-toggle>

      </div>

    </mat-card-content>

  </mat-card>

  

  <div
    class="flex justify-end gap-3 mt-6">

    <button
      mat-stroked-button
      color="primary"
      type="button">

      Cancel

    </button>

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="loading || form.invalid">

      <mat-icon>

        save

      </mat-icon>

      @if(!loading){

Save Role

}

@else{

Saving...

}

    </button>

  </div>

</form>
