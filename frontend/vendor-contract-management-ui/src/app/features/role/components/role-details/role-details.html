<div class="page-container" *ngIf="role && !loading">

    <div class="flex justify-between items-center mb-6">

        <div>

            <h2 class="text-2xl font-bold">

                Role Details

            </h2>

            <p class="text-gray-500">

                {{ role.name }}

            </p>

        </div>

        <div class="flex gap-3">

            <button
                mat-raised-button
                color="primary"
                (click)="edit()">

                <mat-icon>

                    edit

                </mat-icon>

                Edit Role

            </button>

            <button
                mat-stroked-button
                (click)="back()">

                <mat-icon>

                    arrow_back

                </mat-icon>

                Back

            </button>

        </div>

    </div>
