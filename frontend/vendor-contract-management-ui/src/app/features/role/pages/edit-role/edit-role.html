
<div class="max-w-5xl mx-auto">

  <div class="mb-8">

    <div class="flex items-center gap-3">

      <button
        mat-icon-button
        routerLink="/roles">

        <mat-icon>
          arrow_back
        </mat-icon>

      </button>

      <div>

        <h1 class="text-3xl font-bold text-slate-800">
          Edit Role
        </h1>

        <p class="text-slate-500 mt-1">
          Update role information and configuration.
        </p>

      </div>

    </div>

  </div>


  @if (loading && !role) {

    <div class="flex justify-center py-20">

      <p class="text-slate-500 text-lg">
        Loading role...
      </p>

    </div>

  }
  @else if (role) {

    <app-role-form
      [role]="role"
      [loading]="loading"
      (save)="save($event)"
       (cancel)="cancel()">
    </app-role-form>

  }
  @else {

    <div class="text-center py-20">

      <p class="text-red-500">
        Role not found.
      </p>

    </div>

  }

</div>
