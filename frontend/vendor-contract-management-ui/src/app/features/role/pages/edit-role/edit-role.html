<div class="max-w-5xl mx-auto">

  <div class="mb-8">

    <div class="flex items-center gap-3">

      <button
        mat-icon-button
        routerLink="/roles">

        <mat-icon>
          arrow_back
        </mat-icon>

      </button>

      <div>

        <h1 class="text-3xl font-bold text-slate-800">

          Edit Role

        </h1>

        <p class="text-slate-500 mt-1">

          Update role information and configuration.

        </p>

      </div>

    </div>

  </div>

  @if(role){

    <app-role-form

      [role]="role"

      [loading]="loading"

      (save)="save($event)">

    </app-role-form>

  }

</div>
