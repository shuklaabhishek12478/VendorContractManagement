<mat-card class="compare-card">

    <div class="compare-header">

        <mat-icon>

            compare_arrows

        </mat-icon>

        <div>

            <h2>

                Compare With Another Role

            </h2>

            <p>

                Highlight permissions already assigned to another role.

            </p>

        </div>

    </div>

    <mat-form-field
        appearance="outline"
        class="compare-select">

        <mat-label>

            Select Role

        </mat-label>

        <mat-select
            [ngModel]="compareRoleId"
            (ngModelChange)="compareRoleIdChange.emit($event)">

            <mat-option [value]="0">

                Select Role

            </mat-option>

            <mat-option
                *ngFor="let role of roles"
                [value]="role.id">

                {{role.name}}

            </mat-option>

        </mat-select>

    </mat-form-field>

</mat-card>
