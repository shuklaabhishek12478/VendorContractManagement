@if (isLoading) {

<div class="flex justify-center items-center h-96">
    <p class="text-gray-500 text-lg">
        Loading vendor...
    </p>

</div>

}

@else {

<div class="page-container">

    <div class="page-header">

        <button
            class="secondary-btn"
            (click)="cancel()">

            ← Back

        </button>

    </div>

    <h1 class="page-title">

        Edit Vendor

    </h1>

    <app-vendor-form

        [vendor]="vendor"

        [isEditMode]="true"

        (formSubmitted)="updateVendor($event)"

        (formCancelled)="cancel()">

    </app-vendor-form>

</div>

}
