@if (isLoading) {

<div class="flex justify-center items-center h-96">

    <p class="text-gray-500 text-lg">

        Loading vendor...

    </p>

</div>

}

@else if (vendor) {

<div class="page-container">

    <div class="page-header">

        <button
            class="secondary-btn"
            (click)="back()">

            ← Back

        </button>

        <button
            class="primary-btn"
            (click)="editVendor()">

            ✏ Edit

        </button>

    </div>

    <h1 class="page-title">

        Vendor Details

    </h1>

    <app-vendor-general-info
        [vendor]="vendor">
    </app-vendor-general-info>

    <app-vendor-contact-info
        [vendor]="vendor">
    </app-vendor-contact-info>

    <app-vendor-compliance-info
        [vendor]="vendor">
    </app-vendor-compliance-info>

</div>

}

@else {

<div class="flex justify-center items-center h-96">

    <p class="text-red-500">

        Vendor not found.

    </p>

</div>

}
