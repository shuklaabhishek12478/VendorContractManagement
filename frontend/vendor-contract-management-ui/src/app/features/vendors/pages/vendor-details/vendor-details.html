@if (isLoading) {

<div class="flex justify-center items-center h-96">

    <p class="text-gray-500 text-lg">

        Loading Vendor...

    </p>

</div>

}

@else if (vendor) {

<div class="page-container">

    <div class="flex justify-between items-center mb-6">

        <div>

            <h1 class="text-3xl font-bold">

                {{ vendor.vendorName }}

            </h1>

            <p class="text-gray-500">

                {{ vendor.companyName }}

            </p>

        </div>

        <div class="flex gap-3">

            <button
                class="secondary-btn"
                (click)="back()">

                ← Back

            </button>

            <button
                class="primary-btn"
                (click)="editVendor()">

                ✏ Edit Vendor

            </button>

        </div>

    </div>

    <mat-tab-group
        animationDuration="200ms">

        <mat-tab
            label="General">

            <div class="mt-5">

                <app-vendor-general-info
                    [vendor]="vendor">
                </app-vendor-general-info>

            </div>

        </mat-tab>

        <mat-tab
            label="Contact">

            <div class="mt-5">

                <app-vendor-contact-info
                    [vendor]="vendor">
                </app-vendor-contact-info>

            </div>

        </mat-tab>

        <mat-tab
            label="Compliance">

            <div class="mt-5">

                <app-vendor-compliance-info
                    [vendor]="vendor">
                </app-vendor-compliance-info>

            </div>

        </mat-tab>

        <mat-tab
            label="Contracts">

            <div class="mt-5">

               <app-vendor-contracts
                  [contracts]="contracts">
               </app-vendor-contracts>

            </div>

        </mat-tab>

        <mat-tab
            label="Documents">

            <div class="mt-5">

                Coming Soon...

            </div>

        </mat-tab>

        <mat-tab
            label="Activity">

            <div class="mt-5">

                Coming Soon...

            </div>

        </mat-tab>

    </mat-tab-group>

</div>

}

@else {

<div class="flex justify-center items-center h-96">

    Vendor not found.

</div>

}
