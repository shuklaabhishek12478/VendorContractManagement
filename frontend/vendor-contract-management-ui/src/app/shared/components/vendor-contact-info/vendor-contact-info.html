<div class="details-card">

    <h2 class="section-title">

        Contact Information

    </h2>

    <div class="details-grid">

        <div>

            <div class="field-label">

                Contact Person

            </div>

            <div class="field-value">

                {{ vendor.contactPerson }}

            </div>

        </div>

        <div>

            <div class="field-label">

                Email

            </div>

            <div class="field-value">

                {{ vendor.email }}

            </div>

        </div>

        <div>

            <div class="field-label">

                Phone

            </div>

            <div class="field-value">

                {{ vendor.phone }}

            </div>

        </div>

        <div>

            <div class="field-label">

                Address

            </div>

            <div class="field-value">

                {{ vendor.address }}

            </div>

        </div>

    </div>

</div>
