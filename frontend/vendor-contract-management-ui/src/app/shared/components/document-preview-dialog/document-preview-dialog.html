<div
class="flex items-center justify-between border-b px-6 py-4">

    <h2 class="text-xl font-semibold">

        {{data.fileName}}

    </h2>

    <button
        mat-icon-button
        mat-dialog-close>

        <mat-icon>

            close

        </mat-icon>

    </button>

</div>

<mat-dialog-content>

@if(data.isImage){

<img *ngIf="data.isImage"
[src]="previewUrl"
class="max-w-full rounded-lg"/>

}

@if(!data.isImage){

<iframe *ngIf="!data.isImage"
[src]="previewUrl"
width="100%"
height="700">
</iframe>

}

</mat-dialog-content>
