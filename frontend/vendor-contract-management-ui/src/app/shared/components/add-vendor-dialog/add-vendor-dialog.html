<h2 mat-dialog-title>
  Add Vendor
</h2>

<mat-dialog-content>

  <form
    [formGroup]="vendorForm"
    class="grid gap-4 pt-4">

    <mat-form-field>
      <mat-label>Vendor Name</mat-label>
      <input
        matInput
        formControlName="vendorName">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Company Name</mat-label>
      <input
        matInput
        formControlName="companyName">
    </mat-form-field>

    <mat-form-field>
      <mat-label>GST Number</mat-label>
      <input
        matInput
        formControlName="gstNumber">
    </mat-form-field>

    <mat-form-field>
      <mat-label>PAN Number</mat-label>
      <input
        matInput
        formControlName="panNumber">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Contact Person</mat-label>
      <input
        matInput
        formControlName="contactPerson">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Email</mat-label>
      <input
        matInput
        formControlName="email">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Phone</mat-label>
      <input
        matInput
        formControlName="phone">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Address</mat-label>
      <textarea
        matInput
        formControlName="address">
      </textarea>
    </mat-form-field>

  </form>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button
  mat-button
  (click)="close()">
  Cancel
</button>

<button
  mat-flat-button
  color="primary"
  (click)="save()">
  Save
</button>

</mat-dialog-actions>
