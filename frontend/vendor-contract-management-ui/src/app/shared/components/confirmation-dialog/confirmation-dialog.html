<h2 mat-dialog-title class="flex items-center gap-3 text-xl font-bold">

    <mat-icon class="text-amber-500">
        warning_amber
    </mat-icon>

    {{ data.title }}

</h2>

<mat-dialog-content>

    <p class="text-slate-600 leading-6 mt-2">

        {{ data.message }}

    </p>

</mat-dialog-content>

<mat-dialog-actions align="end" class="pt-4">

    <button
        mat-stroked-button
        (click)="cancel()">

        Cancel

    </button>

    <button
        mat-raised-button
        color="warn"
        (click)="confirm()">

        <mat-icon>delete_forever</mat-icon>

        {{ data.confirmText || 'Confirm' }}

    </button>

</mat-dialog-actions>
