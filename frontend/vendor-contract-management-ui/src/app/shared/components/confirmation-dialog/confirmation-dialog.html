<div class="dialog-wrapper">

    <div class="dialog-icon">

        <mat-icon>

            warning_amber

        </mat-icon>

    </div>

    <h2>

        {{ data.title || 'Confirmation' }}

    </h2>

    <p>

        {{ data.message }}

    </p>

    <div class="dialog-actions">

        <button
            mat-stroked-button
            (click)="cancel()">

            Cancel

        </button>

        <button
            mat-raised-button
            color="warn"
            (click)="confirm()">

            <mat-icon>

                {{ data.icon || 'delete' }}

            </mat-icon>

            {{ data.confirmText || 'Confirm' }}

        </button>

    </div>

</div>
