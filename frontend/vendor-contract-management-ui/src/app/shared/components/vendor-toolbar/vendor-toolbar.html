<div class="flex items-center gap-3 mb-6">

  <app-add-vendor-button
      [disabled]="!canAdd"
      (add)="add.emit()">
  </app-add-vendor-button>

  <app-edit-vendor-button
      [disabled]="!canEdit"
      (edit)="edit.emit()">
  </app-edit-vendor-button>

  <app-archive-vendor-button
      [disabled]="!canArchive"
      (archive)="archive.emit()">
  </app-archive-vendor-button>

  <app-remove-vendor-button
      [disabled]="!canRemove"
      (remove)="remove.emit()">
  </app-remove-vendor-button>

</div>
